spring.application.name=ticketflow

# ---------------- DATABASE ----------------
spring.datasource.url=jdbc:mysql://localhost:3306/ticketflow
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ---------------- HIKARICP (IMPORTANT) ----------------
spring.datasource.hikari.pool-name=TicketFlowHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.max-lifetime=1800000

# ---------------- REDIS ----------------
spring.redis.host=localhost
spring.redis.port=6379

# ---------------- SPRING SETTINGS ----------------
spring.flyway.enabled=false
spring.main.lazy-initialization=true

# ---------------- ACTUATOR + METRICS ----------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Enable Hikari metrics
management.metrics.enable.hikari=true
